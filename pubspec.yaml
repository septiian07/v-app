name: tactical_app
description: "Valorant Intelligence Interface — Flutter Boilerplate"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # State & Logic
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Networking
  dio: ^5.8.0+1
  chuck_interceptor: any
  retrofit: 4.4.2
  json_annotation: ^4.9.0

  # Local Storage
  flutter_secure_storage: ^9.2.4

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # UI & Responsiveness
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1

  # WebView
  webview_flutter: ^4.10.0
  firebase_core: ^4.9.0
  firebase_crashlytics: ^5.2.2
  flutter_dotenv: ^6.0.1
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  skeletonizer: 2.1.3
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.15
  injectable_generator: ^2.7.0
  retrofit_generator: 9.1.7
  json_serializable: ^6.9.4
  icons_launcher: ^3.1.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
